<!DOCTYPE html>
<html lang="de">
<head>
    <script src="app.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymWebApp - Professional Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121214; color: #e2e8f0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="font-sans antialiased">

<div id="auth-container" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-xl w-full max-w-md space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-amber-500 tracking-wide">🏋️‍♂️ GymWebApp</h1>
            <p id="auth-subtitle" class="text-zinc-400 text-sm mt-2">Melde dich an, um dein Training zu tracken</p>
        </div>

        <div id="authAlert" class="hidden p-3 rounded-lg text-sm font-medium text-center"></div>

        <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Benutzername</label>
                <input type="text" id="username" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-amber-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Passwort</label>
                <input type="password" id="password" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-amber-500 transition">
            </div>

            <button type="submit" id="authBtn" class="w-full bg-amber-500 hover:bg-amber-600 text-zinc-950 font-bold py-3 rounded-lg transition shadow-lg mt-2">
                Einloggen
            </button>
        </form>

        <div class="text-center border-t border-zinc-800 pt-4">
            <button onclick="toggleAuthMode()" id="toggleAuthBtn" class="text-zinc-400 hover:text-amber-500 text-sm font-medium transition">
                Noch kein Konto? Jetzt registrieren
            </button>
        </div>
    </div>
</div>

<div id="app-container" class="hidden">
    <nav class="bg-zinc-900 border-b border-zinc-800 p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-amber-500 tracking-wide">🏋️‍♂️ GymWebApp</h1>
            <div class="flex items-center space-x-6">
                <button onclick="switchTab('dashboard')" class="text-gray-300 hover:text-white px-3 py-2 text-sm font-medium transition">Dashboard</button>
                <button onclick="switchTab('history-tab'); loadHistory();" class="text-gray-300 hover:text-white px-3 py-2 text-sm font-medium transition">Historie</button>
                <div class="flex items-center space-x-3 border-l border-zinc-800 pl-6">
                    <span id="userStatus" class="text-amber-500/80 text-sm font-semibold bg-amber-500/10 px-3 py-1 rounded-full border border-amber-500/20"></span>
                    <button onclick="logout()" class="text-zinc-500 hover:text-rose-400 text-xs font-medium transition">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">

        <div id="alertBox" class="hidden mb-6 p-4 rounded-lg font-medium text-sm transition-all"></div>

        <div id="tab-dashboard" class="tab-content active space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-xl shadow-lg">
                    <h2 class="text-lg font-bold text-white mb-4">Neuen Trainingsplan erstellen</h2>
                    <div class="flex space-x-2">
                        <input type="text" id="planNameInput" placeholder="z.B. Push Day" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-amber-500">
                        <button onclick="createPlan()" class="bg-amber-500 hover:bg-amber-600 text-zinc-950 font-bold px-4 py-2 rounded-lg transition">Erstellen</button>
                    </div>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-xl shadow-lg">
                    <h2 class="text-lg font-bold text-white mb-4">Übung im Plan anlegen</h2>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Trainingsplan auswählen</label>
                            <select id="exePlanSelect" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-amber-500">
                                <option value="">-- Pläne werden geladen --</option>
                            </select>
                        </div>
                        <input type="text" id="exeName" placeholder="Name (z.B. Bankdrücken)" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-amber-500">
                        <input type="text" id="exeDesc" placeholder="Beschreibung" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-amber-500">
                        <button onclick="createExercise()" class="w-full bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-amber-500 font-bold py-2 rounded-lg transition">Übung anlegen</button>
                    </div>
                </div>
            </div>

            <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-xl shadow-lg space-y-6">
                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 border-b border-zinc-800 pb-4">
                    <div>
                        <h2 class="text-xl font-bold text-white">Aktive Session</h2>
                        <p id="sessionStateText" class="text-zinc-400 text-sm">Kein Workout aktiv.</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        <select id="startPlanSelect" class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 w-48 text-white focus:outline-none focus:border-amber-500">
                            <option value="">-- Plan wählen --</option>
                        </select>
                        <button id="btnStart" onclick="startSession()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-lg transition whitespace-nowrap">Workout Starten</button>
                        <button id="btnEnd" onclick="endSession()" class="hidden bg-rose-600 hover:bg-rose-700 text-white font-bold px-4 py-2 rounded-lg transition JSON-nowrap">Session Beenden</button>
                    </div>
                </div>

                <div id="sessionActionArea" class="hidden space-y-4 transition-all">
                    <h3 class="text-md font-semibold text-amber-500">Satz für Übung hinzufügen</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Übung auswählen</label>
                            <select id="setExerciseSelect" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                                <option value="">-- Übung wählen --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Gewicht (kg)</label>
                            <input type="number" step="0.5" id="setWeight" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-white">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Reps</label>
                            <input type="number" id="setReps" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-white">
                        </div>
                        <div class="flex items-end">
                            <button onclick="addSet()" class="w-full bg-amber-500 hover:bg-amber-600 text-zinc-950 font-bold py-2 rounded-lg transition">Satz loggen</button>
                        </div>
                    </div>

                    <div id="lastSetBox" class="hidden mt-4 p-3 bg-zinc-800 rounded-lg text-sm border border-zinc-700">
                        <span class="text-zinc-400">Letzter Eintrag:</span> <strong id="lastSetText" class="text-white"></strong>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-history-tab" class="tab-content space-y-6">
            <h2 class="text-2xl font-bold text-white mb-4">Deine Workout-Historie</h2>
            <div id="historyContainer" class="space-y-6"></div>
        </div>
    </main>
</div>
</body>
</html>
